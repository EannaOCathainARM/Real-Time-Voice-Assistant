/**
 * Custom gradle tasks for application and tests - adb push to device for application run
 */

def localLlmModelsFolder = file(project.ext.LLM_MODELS_DIR).absolutePath
def localSttModelsFolder = file(project.ext.STT_MODELS_DIR).absolutePath

def deviceFolder = file(project.ext.DEVICE_FOLDER).absolutePath
def adbPushResourcesScript = file(project.ext.PUSH_MODELS_PY).absolutePath
def localConfigFolderLlm = file(project.ext.CONFIG_DIR_LLM).absolutePath
def localConfigFolderStt = file(project.ext.CONFIG_DIR_STT).absolutePath
def localImagesFolder = file(project.ext.IMAGES_DIR).absolutePath
def llmFramework = rootProject.extensions.extraProperties.get("LLM_FRAMEWORK") as String

/**
 * Helper funtion to push model files to a connected device using adb.
 *
 * @param checkDir     Directory to check before pushing. Skips if it doesn't exist.
 * @param pushFromPath Path to push from.
 * @param label        Name for logging (e.g., "LLM", "STT", "Configs").
 * @param extraArgs    Extra CLI args for the push script.
 */
def pushWithAdb = { File checkDir, String pushFromPath, String label, List<String> extraArgs ->
    try {
        if (!checkDir.exists()) {
            println "Skipping ${label} model push: ${checkDir} does not exist"
            return
        }
        println "Pushing ${label} models from ${pushFromPath}" + (label == "LLM" ? " (framework: ${llmFramework})" : "")
        exec {
            commandLine(["python3", adbPushResourcesScript, pushFromPath, deviceFolder] + (extraArgs ?: []))
        }
    } catch (ignored) {
        println "Failed to push ${label} models to device"
    }
}

// Push LLM models after native CMake build
tasks.register("copyLlmModelsWithAdb") {
    group = "model-sync"
    description = "Pushes LLM models to device after native build"

    doLast {
        def checkDir = new File(localLlmModelsFolder, llmFramework)
        pushWithAdb(checkDir, localLlmModelsFolder, "LLM", ["--llm_framework", llmFramework])
    }
}

// Push STT models after native CMake build
tasks.register("copySttModelsWithAdb") {
    group = "model-sync"
    description = "Pushes STT models to device after native build"

    doLast {
        def checkDir = new File(localSttModelsFolder)
        pushWithAdb(checkDir, localSttModelsFolder, "STT", [])
    }
}

// Push config files (LLM and STT) after both model pushes
tasks.register("copyConfigsWithAdb") {
    group = "model-sync"
    description = "Pushes configuration files to device after models"

    doLast {
        def checkDirLlm = new File(localConfigFolderLlm)
        pushWithAdb(checkDirLlm, localConfigFolderLlm, "LLM Configs", [])
        def checkDirStt = new File(localConfigFolderStt)
        pushWithAdb(checkDirStt, localConfigFolderStt, "STT Configs", []) 
    }
}

tasks.register('copyImagesWithAdb') {
    group = "model-sync"
    description = "Pushes test images to device after native build"

    doLast {
        def checkDir = new File(localImagesFolder)
        pushWithAdb(checkDir, localImagesFolder, "Test images", [])
    }
}

// Run LLM model push after assemble task
tasks.matching { it.name.startsWith("assemble") }.configureEach {
    finalizedBy("copyLlmModelsWithAdb")
}

// Run STT model push after LLM push
tasks.named("copyLlmModelsWithAdb") {
    finalizedBy("copySttModelsWithAdb")
}

// Run config push after STT push
tasks.named("copySttModelsWithAdb") {
    finalizedBy("copyConfigsWithAdb")
}

// Push test images if needed
tasks.named("copyLlmModelsWithAdb") {
    finalizedBy("copyImagesWithAdb")
}
